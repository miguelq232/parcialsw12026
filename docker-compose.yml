version: '3.8'

services:
  ai-service:
    build: ./ai-service
    expose:
      - "8001"
    environment:
      - TRAIN_MODEL_ON_START=${TRAIN_MODEL_ON_START:-false}
      - TRAINING_ROWS=${TRAINING_ROWS:-5000}
      - TRAINING_EPOCHS=${TRAINING_EPOCHS:-80}
    volumes:
      - ai_models:/app/models
      - ai_data:/app/data
    restart: always

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AI_PREDICTION_URL=http://ai-service:8001/predict
      - FLOWABLE_DB_PATH=/app/data/flowable-db
      - APP_UPLOAD_DIR=/app/uploads
      - DEMO_RESET_TRAMITES_ENABLED=${DEMO_RESET_TRAMITES_ENABLED:-true}
      - DEMO_BULK_TRAMITES_ENABLED=${DEMO_BULK_TRAMITES_ENABLED:-true}
      - DEMO_BULK_TRAMITES_COUNT=${DEMO_BULK_TRAMITES_COUNT:-45}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      - ai-service
    restart: always

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: always

volumes:
  ai_models:
  ai_data:
  backend_data:
  backend_uploads:
