version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: swp1-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: swp1-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/swp1
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: swp1-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
