version: '3.8'

services:
  mongodb:
    image: mongo:latest
    volumes:
      - mongo_data:/data/db
    restart: always

  ai-service:
    build: ./ai-service
    expose:
      - "8001"
    environment:
      - TRAIN_MODEL_ON_START=${TRAIN_MODEL_ON_START:-false}
      - TRAINING_ROWS=${TRAINING_ROWS:-5000}
      - TRAINING_EPOCHS=${TRAINING_EPOCHS:-80}
    volumes:
      - ai_models:/app/models
      - ai_data:/app/data
    restart: always

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/swp1}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AI_PREDICTION_URL=http://ai-service:8001/predict
    depends_on:
      - mongodb
      - ai-service
    restart: always

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
  ai_models:
  ai_data:
