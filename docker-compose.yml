version: '3.8'

services:
  mongodb:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    restart: always

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    environment:
      - TRAIN_MODEL_ON_START=${TRAIN_MODEL_ON_START:-false}
      - TRAINING_ROWS=${TRAINING_ROWS:-5000}
      - TRAINING_EPOCHS=${TRAINING_EPOCHS:-80}
    volumes:
      - ai_models:/app/models
      - ai_data:/app/data
    restart: always

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/swp1?authSource=admin
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AI_PREDICTION_URL=http://ai-service:8001/predict
    depends_on:
      - mongodb
      - ai-service
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
  ai_models:
  ai_data:
