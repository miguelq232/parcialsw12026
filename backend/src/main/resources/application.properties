spring.application.name=backend
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/swp1}

# Flowable configuration (using H2 for engine state)
spring.datasource.url=jdbc:h2:file:${FLOWABLE_DB_PATH:./flowable-db};DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
groq.api.key=${GROQ_API_KEY:}
app.upload-dir=${APP_UPLOAD_DIR:./uploads}
ai.prediction.url=${AI_PREDICTION_URL:http://localhost:8001/predict}
app.demo.bulk-tramites.enabled=${DEMO_BULK_TRAMITES_ENABLED:true}
app.demo.bulk-tramites.count=${DEMO_BULK_TRAMITES_COUNT:240}
app.demo.reset-tramites.enabled=${DEMO_RESET_TRAMITES_ENABLED:true}
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB


# Flowable Async Executor
flowable.async-executor-activate=true
